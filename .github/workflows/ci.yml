name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend deps
        run: npm ci
        working-directory: client

      - name: Install server deps
        run: npm ci
        working-directory: server

      - name: Frontend tests
        run: npm test
        working-directory: client

      - name: Server tests
        run: npm test
        working-directory: server
